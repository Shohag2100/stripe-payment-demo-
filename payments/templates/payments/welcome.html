<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome | Payment Project</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #5f72be 0%, #121b4e 100%);
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }
    .hero {
      max-width: 760px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(18px);
      padding: 3rem;
    }
    .hero h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.5rem, 4vw, 4rem);
      line-height: 1.02;
    }
    .hero p {
      margin: 0 auto 2rem;
      max-width: 32rem;
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.86);
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.8rem;
      border-radius: 999px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
      text-decoration: none;
    }
    .button-primary {
      background: linear-gradient(135deg, #56ccf2 0%, #2f80ed 100%);
      color: #fff;
      box-shadow: 0 18px 40px rgba(46, 125, 245, 0.32);
    }
    .button-secondary {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .button:hover {
      transform: translateY(-2px);
    }
    .tag {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: #d3e9ff;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .footer {
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <section class="hero">
    <span class="tag">Welcome to your payment hub</span>
    <h1>Fast, secure payments with Stripe checkout.</h1>
    <p>Experience a clean payment flow and see how easy it is to start a checkout session in your app. Click below to begin a test payment in seconds.</p>
    <div class="actions">
      <a class="button button-primary" href="/payment/">Start Payment</a>
      <a class="button button-secondary" href="/payment/success/">View Success</a>
    </div>
    <div class="footer">Built for demo payments with Stripe test mode.</div>
  </section>
</body>
</html>
