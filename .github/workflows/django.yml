name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # This logs in and creates an authenticated session on the runner VM
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build locally first to execute our syntax test
      - name: Build Local Test Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true  # This loads the built image into the local runner's memory
          tags: mishohag/jewelry-web:test

      - name: Syntax & Integrity Check (No Database Needed)
        run: |
          docker run --rm --entrypoint python mishohag/jewelry-web:test -m compileall .

      # This is the fix: It takes the authenticated login session and pushes natively
      - name: Build and Push Production Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true  # This tells buildx to use the login session to push
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jewelry-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jewelry-web:${{ github.sha }}